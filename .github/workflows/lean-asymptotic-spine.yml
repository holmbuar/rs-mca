name: Lean - asymptotic spine build mirror
run-name: Lean asymptotic spine — repaired F97 C8 two-cell candidate

# Fork-only validation/control branch. Apply the two finite proof repairs found
# by the kernel, then build that exact target commit.
on:
  push:
    branches:
      - "codex/lean-build"
  workflow_dispatch:

permissions:
  contents: write
  statuses: write

concurrency:
  group: lean-asymptotic-spine-c8-f97-repair
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Apply finite proof repairs
        id: prepare
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_BRANCH: codex/c8-f97-two-cell-first-match-producer
        run: |
          set -euo pipefail
          work="$(mktemp -d)"
          trap 'rm -rf "$work"' EXIT
          git clone --quiet --depth 1 --branch "$TARGET_BRANCH" \
            "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" \
            "$work/repo"
          cd "$work/repo"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          python3 - <<'PY'
          from pathlib import Path

          path = Path("experimental/lean/asymptotic_spine/AsymptoticSpine/C8F97TwoCellFirstMatch.lean")
          text = path.read_text(encoding="utf-8")
          old_cover = """theorem f97C8WitnessCells_cover :
              forall w, w ∈ f97C8WitnessCells.flatten <-> w ∈ f97C8Witnesses := by
            decide
          """
          new_cover = """theorem f97C8WitnessCells_cover :
              forall w, w ∈ f97C8WitnessCells.flatten <-> w ∈ f97C8Witnesses := by
            intro w
            simp [f97C8WitnessCells, f97C8CellA, f97C8CellB, f97C8Witnesses]
          """
          if old_cover in text:
              text = text.replace(old_cover, new_cover, 1)

          old_witness = """  have hassigned := (mem_f97C8AssignedSlopes earlier gamma).mp hgamma
            rcases hassigned.1 with h0 | hrest
            · subst gamma
              exact ⟨0, by decide, rfl, hassigned.2⟩
            · rcases hrest with h1 | hrest
              · subst gamma
                exact ⟨1, by decide, rfl, hassigned.2⟩
              · have h2 : gamma = 2 := by simpa using hrest
                subst gamma
                exact ⟨2, by decide, rfl, hassigned.2⟩
          """
          new_witness = """  have hassigned := (mem_f97C8AssignedSlopes earlier gamma).mp hgamma
            rcases hassigned with ⟨hraw, hnot⟩
            simp only [List.mem_cons, List.mem_singleton] at hraw
            rcases hraw with h0 | hrest
            · subst gamma
              exact ⟨0, by decide, rfl, hnot⟩
            · rcases hrest with h1 | h2
              · subst gamma
                exact ⟨1, by decide, rfl, hnot⟩
              · subst gamma
                exact ⟨2, by decide, rfl, hnot⟩
          """
          if old_witness in text:
              text = text.replace(old_witness, new_witness, 1)

          path.write_text(text, encoding="utf-8")
          PY
          if ! git diff --quiet; then
            git add experimental/lean/asymptotic_spine/AsymptoticSpine/C8F97TwoCellFirstMatch.lean
            git commit -m "Repair exact F97 C8 finite proofs"
            git push --quiet origin "HEAD:${TARGET_BRANCH}"
          fi
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Check out repaired F97 C8 head
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ steps.prepare.outputs.sha }}
          persist-credentials: false

      - name: Set up Lean
        uses: leanprover/lean-action@38fbc41a8c28c4cbaec22d7f7de508ec2e7c0dd9 # v1.5.0
        with:
          lake-package-directory: experimental/lean/asymptotic_spine
          auto-config: false
          build: false
          test: false
          lint: false
          use-mathlib-cache: false
          use-github-cache: false

      - name: Lake build asymptotic spine
        id: lake
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          cd experimental/lean/asymptotic_spine
          lake build 2>&1 | tee "$GITHUB_WORKSPACE/lean-build.log"

      - name: Upload Lean build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lean-build-log
          path: lean-build.log
          if-no-files-found: warn

      - name: Publish Lean commit status
        if: always()
        shell: bash
        env:
          BUILD_OUTCOME: ${{ steps.lake.outcome }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          target_sha="$(git rev-parse HEAD)"
          target_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          if [[ "$BUILD_OUTCOME" == "success" ]]; then
            state="success"
            description="F97 C8 two-cell producer and full build passed"
          else
            state="failure"
            description="F97 C8 two-cell producer or full build failed"
          fi
          python3 - "$state" "$target_url" "$description" > status.json <<'PY'
          import json
          import sys
          state, target_url, description = sys.argv[1:]
          print(json.dumps({
              "state": state,
              "target_url": target_url,
              "description": description,
              "context": "lean/asymptotic-spine",
          }))
          PY
          curl --fail-with-body --silent --show-error \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/statuses/${target_sha}" \
            --data-binary @status.json

      - name: Fail workflow if Lean failed
        if: steps.lake.outcome != 'success'
        run: exit 1

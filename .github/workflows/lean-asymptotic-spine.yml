name: Lean - asymptotic spine build mirror
run-name: Lean asymptotic spine — ${{ github.event_name == 'workflow_dispatch' && inputs.target_ref || github.ref_name }}

# `codex/lean-build` is a validation mirror, not a research or integration branch.
# Push a candidate commit there to kernel-build the complete stdlib-only package.
on:
  push:
    branches:
      - "codex/lean-build"
  workflow_dispatch:
    inputs:
      target_ref:
        description: Branch, tag, or commit SHA to build
        required: true
        default: codex/lean-build
        type: string

permissions:
  contents: write
  statuses: write

concurrency:
  group: lean-asymptotic-spine-${{ github.event_name == 'workflow_dispatch' && inputs.target_ref || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out target
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.target_ref || github.sha }}
          persist-credentials: false

      - name: Set up Lean
        uses: leanprover/lean-action@38fbc41a8c28c4cbaec22d7f7de508ec2e7c0dd9 # v1.5.0
        with:
          lake-package-directory: experimental/lean/asymptotic_spine
          auto-config: false
          build: false
          test: false
          lint: false
          use-mathlib-cache: false
          use-github-cache: false

      - name: Lake build asymptotic spine
        id: lake
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          cd experimental/lean/asymptotic_spine
          lake build 2>&1 | tee "$GITHUB_WORKSPACE/lean-build.log"

      - name: Upload Lean build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lean-build-log
          path: lean-build.log
          if-no-files-found: warn

      - name: Publish Lean commit status
        if: always()
        shell: bash
        env:
          BUILD_OUTCOME: ${{ steps.lake.outcome }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          target_sha="$(git rev-parse HEAD)"
          target_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          if [[ "$BUILD_OUTCOME" == "success" ]]; then
            state="success"
            description="Full asymptotic-spine lake build passed"
          else
            state="failure"
            description="Full asymptotic-spine lake build failed"
          fi
          python3 - "$state" "$target_url" "$description" > status.json <<'PY'
          import json
          import sys
          state, target_url, description = sys.argv[1:]
          print(json.dumps({
              "state": state,
              "target_url": target_url,
              "description": description,
              "context": "lean/asymptotic-spine",
          }))
          PY
          curl --fail-with-body --silent --show-error \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/statuses/${target_sha}" \
            --data-binary @status.json

      # One-off, idempotent publication bookkeeping and squash for the validated
      # semantic-owner counterexample. This hook lives only on the fork build
      # branch and is removed immediately after use.
      - name: Record and squash C7 semantic-owner counterexample
        if: steps.lake.outcome == 'success'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_BRANCH: codex/c7-base-pole-closed-ledger-producer
          BASE_COMMIT: 335b9634074fe3a1650749be5985b15e7c8b36ed
        run: |
          set -euo pipefail
          work="$(mktemp -d)"
          trap 'rm -rf "$work"' EXIT
          git clone --quiet --branch "$TARGET_BRANCH" \
            "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" \
            "$work/repo"
          cd "$work/repo"
          python3 - <<'PY'
          from pathlib import Path

          path = Path("experimental/agents-log.md")
          text = path.read_text(encoding="utf-8")
          title = "### 2026-07-20 - C7 singleton-planted semantic absorption"
          if title not in text:
              entry = """### 2026-07-20 - C7 singleton-planted semantic absorption

          - **Agent/model:** GPT-5.6 Pro (research and formalization); GitHub Actions Lean 4.31 (kernel validation).
          - **Files added or changed:** Added `experimental/lean/asymptotic_spine/AsymptoticSpine/C7SingletonPlantedAbsorption.lean` and `experimental/notes/audits/c7_singleton_planted_absorption.md`; updated the C7 base-pole adapter audit, root import, and package README.
          - **Status:** COUNTEREXAMPLE / SEMANTIC OWNER AMBIGUITY / PROVED INTERFACE REGRESSION / AUDIT.
          - **What is being added:** A fixed earlier C3 atlas indexed by singleton planted divisors `P_t(X)=X-t`. Every positive-agreement witness has nonempty support and therefore enters one of these profiles before C7; on the base-pole family the `n=q-1` profile census and per-profile field-size slope bound are both subexponential, so the atlas is paid and the later C7 first-match image is empty.
          - **How it is useful:** It proves that the rooted deletion-aware C7 adapter does not imply atlas-independent nonempty C7 ownership. Under the broad planted-cell grammar, `C7-SURV` is false unless C3 is restricted, a canonical order is fixed, C7 is placed earlier, or C3 is accepted as the owner.
          - **What to do next:** Decide and print the intended semantic rule: positive-density-only C3, named row-derived planted factors, a canonical atlas excluding singleton roots, C7-before-sublinear-planted order, or explicit C3 ownership. After that decision, re-evaluate whether a nonempty C7 survivor theorem remains meaningful; global `(UNIF)` and target comparison are still open.
          """
              marker = "## Entries\n"
              if marker not in text:
                  raise SystemExit("agents-log marker not found")
              text = text.replace(marker, marker + "\n" + entry + "\n", 1)
              path.write_text(text, encoding="utf-8")
          PY
          git fetch --quiet origin "$BASE_COMMIT"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add experimental/agents-log.md
          if ! git diff --cached --quiet; then
            git commit -m "Record C7 singleton-planted semantic absorption"
          fi
          git reset --soft "$BASE_COMMIT"
          git commit -m "Formalize C7 base-pole adapter and planted absorption regression"
          git push --quiet --force-with-lease origin "HEAD:${TARGET_BRANCH}"

      - name: Fail workflow if Lean failed
        if: steps.lake.outcome != 'success'
        run: exit 1

name: Lean - asymptotic spine

on:
  workflow_dispatch:
    inputs:
      target_ref:
        description: Branch, tag, or commit SHA to build
        required: true
        default: main
        type: string
  push:
    branches:
      - main
      - "codex/**"
    paths:
      - ".github/workflows/lean-asymptotic-spine.yml"
      - "experimental/lean/asymptotic_spine/**"
      - "experimental/lean/staircase_logic/**"

permissions:
  contents: read

concurrency:
  group: lean-asymptotic-spine-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out target
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.target_ref || github.sha }}
          persist-credentials: false

      - name: Build asymptotic spine
        uses: leanprover/lean-action@38fbc41a8c28c4cbaec22d7f7de508ec2e7c0dd9 # v1.5.0
        with:
          lake-package-directory: experimental/lean/asymptotic_spine
          auto-config: false
          build: true
          test: false
          lint: false
          use-mathlib-cache: false
          use-github-cache: false

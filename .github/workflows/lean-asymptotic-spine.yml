name: Lean - asymptotic spine build mirror
run-name: Lean asymptotic spine — ${{ github.event_name == 'workflow_dispatch' && inputs.target_ref || github.ref_name }}

# `codex/lean-build` is a validation mirror, not a research or integration branch.
# Push a candidate commit there to kernel-build the complete stdlib-only package.
on:
  push:
    branches:
      - "codex/lean-build"
  workflow_dispatch:
    inputs:
      target_ref:
        description: Branch, tag, or commit SHA to build
        required: true
        default: codex/lean-build
        type: string

permissions:
  contents: write
  statuses: write

concurrency:
  group: lean-asymptotic-spine-${{ github.event_name == 'workflow_dispatch' && inputs.target_ref || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out target
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.target_ref || github.sha }}
          persist-credentials: false

      - name: Set up Lean
        uses: leanprover/lean-action@38fbc41a8c28c4cbaec22d7f7de508ec2e7c0dd9 # v1.5.0
        with:
          lake-package-directory: experimental/lean/asymptotic_spine
          auto-config: false
          build: false
          test: false
          lint: false
          use-mathlib-cache: false
          use-github-cache: false

      - name: Lake build asymptotic spine
        id: lake
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          cd experimental/lean/asymptotic_spine
          lake build 2>&1 | tee "$GITHUB_WORKSPACE/lean-build.log"

      - name: Upload Lean build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lean-build-log
          path: lean-build.log
          if-no-files-found: warn

      - name: Publish Lean commit status
        if: always()
        shell: bash
        env:
          BUILD_OUTCOME: ${{ steps.lake.outcome }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          target_sha="$(git rev-parse HEAD)"
          target_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          if [[ "$BUILD_OUTCOME" == "success" ]]; then
            state="success"
            description="Full asymptotic-spine lake build passed"
          else
            state="failure"
            description="Full asymptotic-spine lake build failed"
          fi
          python3 - "$state" "$target_url" "$description" > status.json <<'PY'
          import json
          import sys
          state, target_url, description = sys.argv[1:]
          print(json.dumps({
              "state": state,
              "target_url": target_url,
              "description": description,
              "context": "lean/asymptotic-spine",
          }))
          PY
          curl --fail-with-body --silent --show-error \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/statuses/${target_sha}" \
            --data-binary @status.json

      # One-off, idempotent publication bookkeeping for the validated C7 packet.
      # This workflow exists only on the fork build/research branches, not on the
      # upstream publication branch.
      - name: Append validated C7 result to project agents log
        if: steps.lake.outcome == 'success'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_BRANCH: codex/c7-base-pole-closed-ledger-producer
        run: |
          set -euo pipefail
          work="$(mktemp -d)"
          trap 'rm -rf "$work"' EXIT
          git clone --quiet --depth 1 --branch "$TARGET_BRANCH" \
            "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" \
            "$work/repo"
          cd "$work/repo"
          python3 - <<'PY'
          from pathlib import Path

          path = Path("experimental/agents-log.md")
          text = path.read_text(encoding="utf-8")
          title = "### 2026-07-20 - Rooted C7 base-pole closed-ledger producer"
          if title in text:
              raise SystemExit(0)

          entry = """### 2026-07-20 - Rooted C7 base-pole closed-ledger producer

          - **Agent/model:** GPT-5.6 Pro (research and formalization); GitHub Actions Lean 4.31 (kernel validation).
          - **Files added or changed:** Added `experimental/lean/asymptotic_spine/AsymptoticSpine/C7BasePoleProducer.lean`, `C7BasePoleWitnessProducer.lean`, and `C7BasePoleLineExtension.lean`; retained `C7OwnerRegression.lean`; added `experimental/notes/audits/c7_base_pole_closed_ledger_producer.md`; updated the C7 audit, root import, and package README.
          - **Status:** PROVED LOCAL / FORMALIZATION / CONDITIONAL GLOBAL USE / AUDIT.
          - **What is being added:** A rooted deletion-aware producer for the established base-pole constant-coefficient C7 class. It starts from actual witness fibres and the exact coefficient-to-slope law, removes the aggregate C1--C6 assigned slope image, pays each surviving singleton directly at unit natural scale, and appends the survivors to an earlier closed line with exact budget and natural-scale telescopes.
          - **How it is useful:** This supplies one genuine local C7 producer into `UniformClosedLedger`, preserves the required line-local `sup_line sum_profile` order, and corrects the earlier overstrong claim that the entire raw C7 cell must survive before any payment is possible.
          - **What to do next:** Integrate as a focused follow-up to PR #987 after its interface is available on upstream. Global fixed-before-line atlas coherence, completeness over all received lines, survivor nonemptiness on every line, actual `(UNIF)`, target comparison, and row closure remain open.
          """

          marker = "## Entries\n"
          if marker not in text:
              raise SystemExit("agents-log marker not found")
          text = text.replace(marker, marker + "\n" + entry + "\n", 1)
          path.write_text(text, encoding="utf-8")
          PY
          if git diff --quiet -- experimental/agents-log.md; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add experimental/agents-log.md
          git commit -m "Record rooted C7 closed-ledger producer"
          git push --quiet origin "HEAD:${TARGET_BRANCH}"

      - name: Fail workflow if Lean failed
        if: steps.lake.outcome != 'success'
        run: exit 1

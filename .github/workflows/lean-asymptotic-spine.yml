name: Lean - asymptotic spine build mirror
run-name: Lean asymptotic spine — ${{ github.event_name == 'workflow_dispatch' && inputs.target_ref || github.ref_name }}

# `codex/lean-build` is a validation mirror, not a research or integration branch.
# Push a candidate commit there to kernel-build the complete stdlib-only package.
on:
  push:
    branches:
      - "codex/lean-build"
  workflow_dispatch:
    inputs:
      target_ref:
        description: Branch, tag, or commit SHA to build
        required: true
        default: codex/lean-build
        type: string

permissions:
  contents: read

concurrency:
  group: lean-asymptotic-spine-${{ github.event_name == 'workflow_dispatch' && inputs.target_ref || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out target
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.target_ref || github.sha }}
          persist-credentials: false

      - name: Set up Lean
        uses: leanprover/lean-action@38fbc41a8c28c4cbaec22d7f7de508ec2e7c0dd9 # v1.5.0
        with:
          lake-package-directory: experimental/lean/asymptotic_spine
          auto-config: false
          build: false
          test: false
          lint: false
          use-mathlib-cache: false
          use-github-cache: false

      - name: Lake build asymptotic spine
        shell: bash
        run: |
          set -o pipefail
          cd experimental/lean/asymptotic_spine
          lake build 2>&1 | tee "$GITHUB_WORKSPACE/lean-build.log"

      - name: Upload Lean build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lean-build-log
          path: lean-build.log
          if-no-files-found: warn

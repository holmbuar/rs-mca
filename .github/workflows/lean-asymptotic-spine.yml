name: Lean - semantic atlas publication squash
run-name: Squash and validate certified semantic atlas ownership

# Fork-only PR trigger used to prepare one upstream publication branch. The
# temporary control PR is never merged.
on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  statuses: write

concurrency:
  group: lean-semantic-atlas-publication
  cancel-in-progress: true

jobs:
  build:
    if: github.event_name == 'workflow_dispatch' || github.head_ref == 'codex/lean-build'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out fork main
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: true

      - name: Prepare one-commit publication branch
        id: prepare
        shell: bash
        env:
          TARGET_BRANCH: codex/c7-base-pole-closed-ledger-producer
          UPSTREAM_REPOSITORY: przchojecki/rs-mca
          RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git remote remove upstream 2>/dev/null || true
          git remote add upstream "https://github.com/${UPSTREAM_REPOSITORY}.git"

          git fetch --no-tags origin "${TARGET_BRANCH}"
          source_sha="$(git rev-parse FETCH_HEAD)"
          git fetch --no-tags upstream main
          base_sha="$(git rev-parse FETCH_HEAD)"

          git checkout -B publication "${base_sha}"
          git checkout "${source_sha}" -- \
            experimental/lean/asymptotic_spine/AsymptoticSpine/UniformClosedLedger.lean \
            experimental/lean/asymptotic_spine/AsymptoticSpine/SemanticAtlasOwnership.lean \
            experimental/notes/audits/lean_uniform_closed_ledger_interface.md

          python3 - "${base_sha}" "${RUN_ID}" <<'PY'
          from pathlib import Path
          import re
          import sys

          base_sha, run_id = sys.argv[1:]

          root = Path("experimental/lean/asymptotic_spine/AsymptoticSpine.lean")
          root_text = root.read_text(encoding="utf-8")
          marker = "import AsymptoticSpine.AddBack\n"
          imports = (
              "import AsymptoticSpine.UniformClosedLedger\n"
              "import AsymptoticSpine.SemanticAtlasOwnership\n"
          )
          if "import AsymptoticSpine.UniformClosedLedger" not in root_text:
              if marker not in root_text:
                  raise SystemExit("AsymptoticSpine import marker not found")
              root_text = root_text.replace(marker, marker + imports, 1)
          root.write_text(root_text, encoding="utf-8")

          audit = Path("experimental/notes/audits/lean_uniform_closed_ledger_interface.md")
          audit_text = audit.read_text(encoding="utf-8")
          audit_text = re.sub(r"\*\*Date:\*\* .*", "**Date:** 2026-07-20.", audit_text, count=1)
          audit_text = re.sub(
              r"\*\*Replayed base:\*\* upstream `[^`]+`\.",
              f"**Replayed base:** upstream `{base_sha}`.",
              audit_text,
              count=1,
          )
          semantic_section = f"""## Certified semantic ownership extension

`AsymptoticSpine.SemanticAtlasOwnership` narrows semantic C3 ownership to
row-derived certified profiles.  `CertifiedC3Profile` carries certificate
provenance, its post-deletion distinct-slope list, a natural profile scale, and
a direct payment theorem.  `WitnessLocalRefinement` records witness-local factor
information but intentionally has no constructor into a semantic owner.

`CertifiedC3ThenLater` composes certified C3 payments before later C4--C9 or
primitive payments.  Its explicit fields require C3 and later profile-count
control, duplicate-free cross-slice ownership, and numerical atlas
exhaustiveness.  The resulting `ClosedLineLedger` and `UniformClosedLedger`
reuse the existing compiler unchanged, so the proof still takes

```text
sup_line sum_profile
```

and never interchanges the outer line supremum with the profile sum.  The
interface does not construct the concrete row-derived certificate catalogue or
prove the final line-local envelope; those remain producer obligations.

The exact one-commit publication branch is rebuilt and checked by GitHub Actions
workflow run `{run_id}`.

"""
          marker2 = "## Field and declaration map\n"
          if "## Certified semantic ownership extension" not in audit_text:
              if marker2 not in audit_text:
                  raise SystemExit("audit insertion marker not found")
              audit_text = audit_text.replace(marker2, semantic_section + marker2, 1)
          audit_text = audit_text.replace(
              "lake build AsymptoticSpine.UniformClosedLedger\nlake build",
              "lake build AsymptoticSpine.UniformClosedLedger\n"
              "lake build AsymptoticSpine.SemanticAtlasOwnership\n"
              "lake build",
              1,
          )
          audit_text = audit_text.replace(
              "The focused build passed with 7 jobs\nand the full package passed with 28 jobs.",
              "The focused module builds and the full package build pass on Lean 4.31.",
              1,
          )
          audit.write_text(audit_text, encoding="utf-8")

          log = Path("experimental/agents-log.md")
          log_text = log.read_text(encoding="utf-8")
          title = "### 2026-07-20 - Certified semantic atlas ownership interface"
          if title not in log_text:
              entry = f"""{title}

- **Agent/model:** GPT-5.6 Pro (research, formalization, and proof repair); GitHub Actions Lean 4.31 (kernel validation).
- **Files added or changed:** Added `experimental/lean/asymptotic_spine/AsymptoticSpine/UniformClosedLedger.lean` and `SemanticAtlasOwnership.lean`; added `experimental/notes/audits/lean_uniform_closed_ledger_interface.md`; updated the asymptotic-spine root import and this log.
- **Status:** PROVED / FORMALIZATION / CONDITIONAL RS INSTANTIATION / AUDIT.
- **What is being added:** A finite closed-ledger compiler preserving `sup_line sum_profile`, together with a typed distinction between certified row-derived C3 owners and witness-local refinements. Certified C3 profiles compose with later paid profiles through explicit first-match ownership, profile-count, exhaustiveness, natural-scale, and line-local envelope fields.
- **How it is useful:** This resolves the C3/C7 semantic ownership ambiguity at the interface boundary and gives concrete C1--C9 producers a common target without manufacturing witness coverage, residual/full comparison, Sidon payment, a ray compiler, or final `(UNIF)`.
- **What to do next:** Construct the actual row-derived certificate catalogue and instantiate one real residual class through the exact distinct-slope payment chain; then prove the honest line-local envelope and target comparison. The publication replay is GitHub Actions run `{run_id}`.
"""
              marker3 = "## Entries\n"
              if marker3 not in log_text:
                  raise SystemExit("agents-log marker not found")
              log_text = log_text.replace(marker3, marker3 + "\n" + entry + "\n", 1)
              log.write_text(log_text, encoding="utf-8")
          PY

          git add \
            experimental/agents-log.md \
            experimental/lean/asymptotic_spine/AsymptoticSpine.lean \
            experimental/lean/asymptotic_spine/AsymptoticSpine/UniformClosedLedger.lean \
            experimental/lean/asymptotic_spine/AsymptoticSpine/SemanticAtlasOwnership.lean \
            experimental/notes/audits/lean_uniform_closed_ledger_interface.md

          git commit -m "Formalize certified semantic atlas ownership"
          target_sha="$(git rev-parse HEAD)"
          git push --force origin "HEAD:${TARGET_BRANCH}"

          echo "sha=${target_sha}" >> "$GITHUB_OUTPUT"
          echo "base_sha=${base_sha}" >> "$GITHUB_OUTPUT"

      - name: Set up Lean
        uses: leanprover/lean-action@38fbc41a8c28c4cbaec22d7f7de508ec2e7c0dd9 # v1.5.0
        with:
          lake-package-directory: experimental/lean/asymptotic_spine
          auto-config: false
          build: false
          test: false
          lint: false
          use-mathlib-cache: false
          use-github-cache: false

      - name: Lake build asymptotic spine
        id: lake
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          cd experimental/lean/asymptotic_spine
          lake build 2>&1 | tee "$GITHUB_WORKSPACE/lean-build.log"

      - name: Upload publication logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: semantic-atlas-publication-logs
          path: lean-build.log
          if-no-files-found: warn

      - name: Publish Lean commit status
        if: always()
        shell: bash
        env:
          BUILD_OUTCOME: ${{ steps.lake.outcome }}
          GH_TOKEN: ${{ github.token }}
          TARGET_SHA: ${{ steps.prepare.outputs.sha }}
        run: |
          set -euo pipefail
          target_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          if [[ "$BUILD_OUTCOME" == "success" ]]; then
            state="success"
            description="Squashed semantic atlas branch and full build passed"
          else
            state="failure"
            description="Squashed semantic atlas branch full build failed"
          fi
          python3 - "$state" "$target_url" "$description" > status.json <<'PY'
          import json
          import sys
          state, target_url, description = sys.argv[1:]
          print(json.dumps({
              "state": state,
              "target_url": target_url,
              "description": description,
              "context": "lean/asymptotic-spine",
          }))
          PY
          curl --fail-with-body --silent --show-error \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/statuses/${TARGET_SHA}" \
            --data-binary @status.json

      - name: Fail workflow if Lean failed
        if: steps.lake.outcome != 'success'
        run: exit 1

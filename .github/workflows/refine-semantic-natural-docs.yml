name: Refine semantic natural-scale documentation

on:
  push:
    branches:
      - agent/m31-semantic-owner-shell

permissions:
  contents: write

jobs:
  refine:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out candidate branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: agent/m31-semantic-owner-shell
          fetch-depth: 1
      - name: Refine note and agents log
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          note = Path('experimental/notes/thresholds/m31_q_semantic_owner_shell.md')
          text = note.read_text()
          text = text.replace(
              "The stdlib-only Lean module\n`experimental/lean/m31_q_rooted_shell/M31QRootedShell/SemanticOwner.lean`\nformalizes this statement, its actual-residual consequence, and the mandatory\n`F_241` regression.  It imports PR #1005's rooted-shell arithmetic and does not\nreprove the rooted-shell summation reduction or either support-only\ncounterexample.",
              "The stdlib-only Lean modules\n`experimental/lean/m31_q_rooted_shell/M31QRootedShell/SemanticOwner.lean` and\n`experimental/lean/m31_q_rooted_shell/M31QRootedShell/SemanticNaturalScale.lean`\nformalize this statement, its literal `q_prof^w` specialization, its\nactual-residual consequence, and the mandatory `F_241` regression.  They import\nPR #1005's rooted-shell arithmetic and do not reprove the rooted-shell\nsummation reduction or either support-only counterexample."
          )
          text = text.replace(
              "`semantic_three_plus_seven_on_actual_residual` proves:",
              "`semantic_natural_three_plus_seven_on_actual_residual` proves:"
          )
          text = text.replace(
              "and SemanticEnvelopeOrOwner(q_prof^w,3,7,H_e)",
              "and SemanticNaturalEnvelopeOrOwner(q_prof^w,3,7,H_e)"
          )
          text = text.replace(
              "`violation_forces_certified_earlier_owner` proves:",
              "`natural_violation_forces_certified_earlier_owner` proves:"
          )
          text = text.replace(
              "SemanticEnvelopeOrOwner(Q,b,c,H_e)\nand c H_e < Q * max(d_e(A)-b,0)",
              "SemanticNaturalEnvelopeOrOwner(q_prof^w,b,c,H_e)\nand c H_e < q_prof^w * max(d_e(A)-b,0)"
          )
          text = text.replace(
              "The new theorem `f241_semantic_target_forces_certified_owner` proves:",
              "The new theorem `f241_semantic_natural_target_forces_certified_owner` proves:"
          )
          text = text.replace(
              "The theorem `f241_all_residual_rejects_semantic_target` proves:",
              "The theorem `f241_all_residual_rejects_semantic_natural_target` proves:"
          )
          note.write_text(text)

          log = Path('experimental/agents-log.md')
          text = log.read_text()
          text = text.replace(
              "`experimental/lean/m31_q_rooted_shell/M31QRootedShell/SemanticOwner.lean`, `experimental/lean/m31_q_rooted_shell/SEMANTIC_OWNER_CORRESPONDENCE.md`",
              "`experimental/lean/m31_q_rooted_shell/M31QRootedShell/SemanticOwner.lean`, `experimental/lean/m31_q_rooted_shell/M31QRootedShell/SemanticNaturalScale.lean`, `experimental/lean/m31_q_rooted_shell/SEMANTIC_OWNER_CORRESPONDENCE.md`"
          )
          text = text.replace(
              "Every owner prints a deduplicated line-local slope image, exact numerator and slope denominator, and separate natural prefix scale;",
              "Every owner prints a deduplicated line-local slope image, exact numerator and slope denominator, and separate natural prefix scale; the shell coefficient is definitionally `q_prof^w`;"
          )
          log.write_text(text)
          PY
      - name: Commit documentation refinement
        shell: bash
        run: |
          if git diff --quiet -- experimental/notes/thresholds/m31_q_semantic_owner_shell.md experimental/agents-log.md; then
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add experimental/notes/thresholds/m31_q_semantic_owner_shell.md experimental/agents-log.md
          git commit -m 'Record literal natural-scale semantic target'
          git push origin HEAD:agent/m31-semantic-owner-shell

name: Refine semantic residual documentation

on:
  push:
    branches:
      - agent/m31-semantic-owner-shell

permissions:
  contents: write

jobs:
  refine:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out candidate branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: agent/m31-semantic-owner-shell
          fetch-depth: 1
      - name: Update note and agents log
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          note = Path('experimental/notes/thresholds/m31_q_semantic_owner_shell.md')
          text = note.read_text()
          text = text.replace(
              '`experimental/lean/m31_q_rooted_shell/M31QRootedShell/SemanticNaturalScale.lean`\nformalize this statement, its literal `q_prof^w` specialization, its',
              '`experimental/lean/m31_q_rooted_shell/M31QRootedShell/SemanticNaturalScale.lean`, and\n`experimental/lean/m31_q_rooted_shell/M31QRootedShell/SemanticResidualFilter.lean`\nformalize this statement, its literal `q_prof^w` specialization, its'
          )
          text = text.replace(
              'PROVED SEMANTIC INTERFACE AND COMPILERS\nCONDITIONAL SEMANTIC SO3+7 INPUT\nMANDATORY F_241 REGRESSION\nOPEN DEPLOYED M31 RESIDUAL',
              'PROVED SEMANTIC INTERFACE AND COMPILERS\nPROVED EXECUTABLE RESIDUAL FILTER\nCONDITIONAL SEMANTIC SO3+7 INPUT\nMANDATORY F_241 TWO-OWNER REGRESSION\nOPEN DEPLOYED M31 RESIDUAL'
          )
          anchor = '''`HasEarlierOwner` is `Nonempty` packaging of a concrete
          `EarlierOwnerCertificate`.  This keeps `(SO3+7)` proposition-valued while the
          underlying certificate still contains the executable owner result and exposes
          the full chain and budget through the proved certificate theorems.
          '''
          insert = anchor + '''
          ### Executable actual residual

          `residualShell ledger shell` applies the same globally fixed owner function to
          every semantic neighbor and retains exactly the `classify = none` fiber.  The
          complementary `ownedNeighbors` filter retains exactly `classify != none`.
          Their lengths add to the original rooted degree, and the residual construction
          preserves the received line, prefix target, exchange shell, semantic validity,
          and duplicate-free support projections.

          Every member of `ownedNeighbors` has an `EarlierOwnerCertificate` through the
          `PaidOwnerLedger` soundness fields.  Thus the executable filter cannot delete a
          support merely because it has quotient/dihedral symmetry or an empty planted
          core: deletion requires the full semantic line-to-slope certificate and paid
          owner profile.
          '''
          if '### Executable actual residual' not in text:
              if anchor not in text:
                  raise SystemExit('note insertion anchor not found')
              text = text.replace(anchor, insert, 1)
          compiler_anchor = '''These are line-local statements.  They do not replace
          `sup_line sum_profile` by `sum_profile sup_line` and do not merge an earlier
          owner numerator with the C9 prefix-support count.
          '''
          compiler_insert = compiler_anchor + '''
          ### Executable residual compiler

          `semanticNaturalEnvelopeOrOwner_of_residualShell` proves that it is enough to
          establish the natural-scale shell inequality on the executable post-C1--C8
          residual.  If the earlier-owned filter is empty, the residual equals the full
          shell and the inequality is returned directly.  Otherwise the theorem returns
          a concrete certified earlier owner from the complement.
          '''
          if '### Executable residual compiler' not in text:
              if compiler_anchor not in text:
                  raise SystemExit('compiler insertion anchor not found')
              text = text.replace(compiler_anchor, compiler_insert, 1)
          f_anchor = '''The theorem `f241_all_residual_rejects_semantic_natural_target` proves:

          > If every neighbor is declared post-C1--C8 residual, `(SO3+7)` is false on the
          > packet.
          '''
          f_insert = f_anchor + '''
          The executable regression is sharper.  The exact inequality permits at most
          eight residual neighbors.  Since the displayed shell has rooted degree ten and
          the residual/owned filters partition it exactly,
          `f241_residualShell_bound_forces_two_owned_neighbors` proves that **at least two**
          distinct support projections must carry genuine earlier-owner certificates.
          One untyped owner label is therefore not enough to absorb the packet.
          '''
          if 'at least two' not in text[text.find('## Mandatory `F_241` regression'):]:
              if f_anchor not in text:
                  raise SystemExit('F241 insertion anchor not found')
              text = text.replace(f_anchor, f_insert, 1)
          note.write_text(text)

          log = Path('experimental/agents-log.md')
          text = log.read_text()
          text = text.replace(
              '`experimental/lean/m31_q_rooted_shell/M31QRootedShell/SemanticNaturalScale.lean`, `experimental/lean/m31_q_rooted_shell/SEMANTIC_OWNER_CORRESPONDENCE.md`',
              '`experimental/lean/m31_q_rooted_shell/M31QRootedShell/SemanticNaturalScale.lean`, `experimental/lean/m31_q_rooted_shell/M31QRootedShell/SemanticResidualFilter.lean`, `experimental/lean/m31_q_rooted_shell/SEMANTIC_OWNER_CORRESPONDENCE.md`'
          )
          text = text.replace(
              '**Status:** PROVED SEMANTIC INTERFACE AND COMPILERS / CONDITIONAL SEMANTIC SO3+7 INPUT / MANDATORY F_241 REGRESSION / OPEN DEPLOYED M31 RESIDUAL.',
              '**Status:** PROVED SEMANTIC INTERFACE AND COMPILERS / PROVED EXECUTABLE RESIDUAL FILTER / CONDITIONAL SEMANTIC SO3+7 INPUT / MANDATORY F_241 TWO-OWNER REGRESSION / OPEN DEPLOYED M31 RESIDUAL.'
          )
          text = text.replace(
              'the semantic `3+7 OR owner` compilers and imported `F_241` regression reject all-residual and all-false support-only adapters.',
              'the executable `none`-fiber residual preserves the semantic shell data; the semantic `3+7 OR owner` compilers reject support-only adapters; and the imported `F_241` arithmetic forces residual degree at most eight, hence at least two genuinely earlier-owned neighbors in the ten-neighbor shell.'
          )
          text = text.replace(
              'prove `SemanticEnvelopeOrOwner` on every deployed rooted shell,',
              'prove the natural-scale bound on every executable `residualShell`,'
          )
          log.write_text(text)
          PY
      - name: Commit documentation update
        shell: bash
        run: |
          if git diff --quiet -- experimental/notes/thresholds/m31_q_semantic_owner_shell.md experimental/agents-log.md; then
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add experimental/notes/thresholds/m31_q_semantic_owner_shell.md experimental/agents-log.md
          git commit -m 'Record executable semantic residual and F241 owner floor'
          git push origin HEAD:agent/m31-semantic-owner-shell

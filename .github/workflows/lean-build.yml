name: Lean build
run-name: "Lean build — ${{ github.event_name == 'workflow_dispatch' && inputs.target_ref || format('PR #{0}', github.event.pull_request.number) }}"

# On-demand kernel builds of the stdlib-only Lean packages under experimental/lean/.
on:
  pull_request:
    paths:
      - "experimental/lean/**"
      - ".github/workflows/lean-build.yml"
      - ".agent/append-m31-rooted-shell-log"
  workflow_dispatch:
    inputs:
      target_ref:
        description: Branch, tag, or commit SHA to build
        required: true
        type: string
      packages:
        description: Comma-separated lake package directories
        required: false
        default: "experimental/lean/asymptotic_spine"
        type: string

permissions:
  contents: write
  statuses: write
  pull-requests: read

concurrency:
  group: lean-build-${{ github.event_name == 'workflow_dispatch' && github.run_id || format('pr-{0}', github.event.pull_request.number) }}
  cancel-in-progress: true

jobs:
  append_m31_log:
    if: >-
      github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref == 'agent/m31-q-rooted-shell-upstream-ready'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out candidate head
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          persist-credentials: true

      - name: Append required agents-log entry
        shell: bash
        run: |
          set -euo pipefail
          marker=.agent/append-m31-rooted-shell-log
          [[ -f "$marker" ]] || exit 0
          python3 - <<'PY'
          from pathlib import Path

          path = Path('experimental/agents-log.md')
          text = path.read_text(encoding='utf-8')
          title = '### 2026-07-20 - Mersenne-31 rooted-shell Q reduction and support-only route counterexamples'
          if title not in text:
              entry = '''### 2026-07-20 - Mersenne-31 rooted-shell Q reduction and support-only route counterexamples

- **Agent/model:** GPT-5.6 Pro.
- **Files added or changed:** `experimental/notes/thresholds/m31_q_rooted_shell_envelope.md`, `experimental/notes/thresholds/m31_q_three_plus_seven_multiplicative_counterexample.md`, `experimental/data/certificates/m31-q-rooted-shell-envelope/`, `experimental/data/certificates/m31-q-3plus7-multiplicative-counterexample/`, `experimental/scripts/verify_m31_q_rooted_shell_envelope.py`, `experimental/scripts/verify_m31_q_three_plus_seven_multiplicative_counterexample.py`, `experimental/lean/m31_q_rooted_shell/`, and `experimental/agents-log.md`.
- **Status:** PROVED REDUCTION / EXACT ARITHMETIC / COUNTEREXAMPLE / OPEN DEPLOYED INPUT.
- **What is being added:** A rooted-shell summation compiler reduces the binding Mersenne-31 row-sharp Q atom to a local `3+7` shell inequality, with exact deployed list/MCA arithmetic and faithful finite route controls. A second packet gives a Lean-proved multiplicative-subgroup counterexample showing that support-level quotient/dihedral and planted-core pruning alone does not imply `3+7`; semantic slope ownership must enter the next theorem.
- **How it is useful:** The packet gives a precise sufficient closure interface, exact finite reserves, and mandatory regressions against both `2+7` and support-only `3+7` proof routes, while keeping support families distinct from actual first-match slope owners.
- **What to do next:** Prove the deployed semantic alternative `3+7 OR certified earlier slope owner`, preserving the received line, explanation state, first-match projector, natural profile scale, and exact slope budget. Do not claim row-sharp Q or an adjacent safe row from the reduction or finite controls alone.

'''
              anchor = '## Entries\n\n'
              if anchor not in text:
                  raise SystemExit('agents-log entry anchor not found')
              text = text.replace(anchor, anchor + entry, 1)
              path.write_text(text, encoding='utf-8')
          PY
          rm "$marker"
          rmdir .agent 2>/dev/null || true

      - name: Commit required log entry
        shell: bash
        env:
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          set -euo pipefail
          if git diff --quiet && git diff --cached --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Record M31 rooted-shell research packet"
          git push origin "HEAD:${HEAD_REF}"

  detect:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      packages: ${{ steps.pkgs.outputs.packages }}
    steps:
      - name: Check out candidate head
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.target_ref || github.event.pull_request.head.sha }}
          persist-credentials: false

      - name: Resolve lake packages to build
        id: pkgs
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PACKAGES_INPUT: ${{ inputs.packages }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            candidates="$(tr ',' '\n' <<<"$PACKAGES_INPUT")"
          else
            candidates="$(gh api --paginate "repos/${GITHUB_REPOSITORY}/pulls/${PR_NUMBER}/files" \
              --jq '.[].filename' \
              | awk -F/ '$1 == "experimental" && $2 == "lean" && NF >= 4 {print $1 "/" $2 "/" $3}' \
              | sort -u)"
          fi
          pkgs=()
          while IFS= read -r dir; do
            dir="${dir%/}"
            [[ -z "$dir" ]] && continue
            if [[ -f "$dir/lakefile.lean" || -f "$dir/lakefile.toml" ]]; then
              pkgs+=("$dir")
            else
              echo "skipping $dir (no lakefile)"
            fi
          done <<<"$candidates"
          packages="$(printf '%s\n' "${pkgs[@]:-}" | jq -R . | jq -cs 'map(select(length > 0))')"
          echo "packages=$packages" >> "$GITHUB_OUTPUT"
          echo "building: $packages"

  build:
    needs: detect
    if: needs.detect.outputs.packages != '[]'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJSON(needs.detect.outputs.packages) }}
    name: ${{ matrix.package }}
    steps:
      - name: Check out candidate head
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.target_ref || github.event.pull_request.head.sha }}
          persist-credentials: false

      - name: Set up Lean
        uses: leanprover/lean-action@38fbc41a8c28c4cbaec22d7f7de508ec2e7c0dd9 # v1.5.0
        with:
          lake-package-directory: ${{ matrix.package }}
          auto-config: false
          build: false
          test: false
          lint: false
          use-mathlib-cache: false
          use-github-cache: true

      - name: Lake build
        id: lake
        continue-on-error: true
        shell: bash
        env:
          PKG_DIR: ${{ matrix.package }}
        run: |
          set -o pipefail
          cd "$PKG_DIR"
          lake build 2>&1 | tee "$GITHUB_WORKSPACE/lean-build.log"

      - name: Upload Lean build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lean-build-log-${{ strategy.job-index }}
          path: lean-build.log
          if-no-files-found: warn

      - name: Publish Lean commit status
        if: always()
        continue-on-error: true
        shell: bash
        env:
          BUILD_OUTCOME: ${{ steps.lake.outcome }}
          GH_TOKEN: ${{ github.token }}
          PKG_DIR: ${{ matrix.package }}
        run: |
          set -euo pipefail
          sha="$(git rev-parse HEAD)"
          pkg="$(basename "$PKG_DIR")"
          if [[ "$BUILD_OUTCOME" == "success" ]]; then
            state="success"
            description="lake build passed"
          else
            state="failure"
            description="lake build failed"
          fi
          gh api "repos/${GITHUB_REPOSITORY}/statuses/${sha}" \
            -f state="$state" \
            -f context="lean/${pkg}" \
            -f description="$description" \
            -f target_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"

      - name: Fail workflow if Lean failed
        if: steps.lake.outcome != 'success'
        run: exit 1

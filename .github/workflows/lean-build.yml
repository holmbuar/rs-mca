name: Lean build
run-name: "Lean build — PR #${{ github.event.pull_request.number }}"

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "experimental/lean/**"
      - ".github/workflows/lean-build.yml"

permissions:
  contents: read
  statuses: write
  pull-requests: read

concurrency:
  group: lean-m31-logstage-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out candidate head
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false

      - name: Set up Lean
        uses: leanprover/lean-action@38fbc41a8c28c4cbaec22d7f7de508ec2e7c0dd9 # v1.5.0
        with:
          lake-package-directory: experimental/lean/m31_q_rooted_shell
          auto-config: false
          build: false
          test: false
          lint: false
          use-mathlib-cache: false
          use-github-cache: true

      - name: Lake build
        id: lake
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          cd experimental/lean/m31_q_rooted_shell
          lake build 2>&1 | tee "$GITHUB_WORKSPACE/lean-build.log"

      - name: Upload Lean build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lean-build-log-m31-q-rooted-shell
          path: lean-build.log
          if-no-files-found: warn

      - name: Publish Lean commit status
        if: always()
        continue-on-error: true
        shell: bash
        env:
          BUILD_OUTCOME: ${{ steps.lake.outcome }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          sha="$(git rev-parse HEAD)"
          if [[ "$BUILD_OUTCOME" == "success" ]]; then
            state=success
            description="lake build passed"
          else
            state=failure
            description="lake build failed"
          fi
          gh api "repos/${GITHUB_REPOSITORY}/statuses/${sha}" \
            -f state="$state" \
            -f context="lean/m31_q_rooted_shell" \
            -f description="$description" \
            -f target_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"

      - name: Fail workflow if Lean failed
        if: steps.lake.outcome != 'success'
        run: exit 1
